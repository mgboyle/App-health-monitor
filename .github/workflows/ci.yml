name: Health Monitor CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run health checks every hour
    - cron: '0 * * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=app --cov-report=term-missing
    
    - name: Run linting
      run: |
        pip install flake8
        flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__,*.pyc

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t health-monitor:latest .
    
    - name: Test Docker image
      run: |
        docker run -d -p 5000:5000 --name health-monitor-test health-monitor:latest
        sleep 10
        curl -f http://localhost:5000/api/health || exit 1
        docker stop health-monitor-test

  health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run health checks
      run: |
        python -c "
        from app.app import create_app
        from app.models import db, Endpoint
        from app.health_checker import HealthChecker
        
        app = create_app('production')
        with app.app_context():
            endpoints = Endpoint.query.filter_by(enabled=True).all()
            print(f'Running health checks for {len(endpoints)} endpoints...')
            HealthChecker.check_all_endpoints(app)
            print('Health checks completed!')
        "
    
    - name: Generate health report
      run: |
        python -c "
        from app.app import create_app
        from app.models import db, Endpoint, HealthCheck
        from datetime import datetime, timedelta
        
        app = create_app('production')
        with app.app_context():
            endpoints = Endpoint.query.filter_by(enabled=True).all()
            
            print('\\n=== Health Check Report ===')
            print(f'Generated at: {datetime.utcnow().isoformat()}\\n')
            
            for endpoint in endpoints:
                latest = HealthChecker.get_latest_status(endpoint.id)
                if latest:
                    print(f'{endpoint.name}: {latest.status}')
                    if latest.response_time:
                        print(f'  Response time: {latest.response_time:.2f}ms')
                    if latest.error_message:
                        print(f'  Error: {latest.error_message}')
                else:
                    print(f'{endpoint.name}: Not yet checked')
                print()
        "
