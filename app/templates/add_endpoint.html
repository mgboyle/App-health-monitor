{% extends "base.html" %}

{% block title %}Add Endpoint - App Health Monitor{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Add New Endpoint</h1>
    
    <form method="post" class="endpoint-form">
        <div class="form-group">
            <label for="name">Endpoint Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Production API">
        </div>

        <div class="form-group">
            <label for="url">URL *</label>
            <input type="url" id="url" name="url" required placeholder="https://api.example.com/health">
        </div>

        <div class="form-group">
            <label for="endpoint_type">Endpoint Type</label>
            <select id="endpoint_type" name="endpoint_type">
                <option value="REST">REST</option>
                <option value="WCF">WCF</option>
                <option value="SOAP">SOAP</option>
                <option value="GraphQL">GraphQL</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="check_interval">Check Interval (seconds)</label>
                <input type="number" id="check_interval" name="check_interval" value="60" min="10" max="3600">
            </div>

            <div class="form-group">
                <label for="timeout">Timeout (seconds)</label>
                <input type="number" id="timeout" name="timeout" value="30" min="5" max="300">
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="enabled" checked>
                Enable monitoring for this endpoint
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Endpoint</button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
