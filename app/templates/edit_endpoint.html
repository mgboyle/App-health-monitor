{% extends "base.html" %}

{% block title %}Edit Endpoint - App Health Monitor{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Edit Endpoint</h1>
    
    <form method="post" class="endpoint-form">
        <div class="form-group">
            <label for="name">Endpoint Name *</label>
            <input type="text" id="name" name="name" required value="{{ endpoint.name }}">
        </div>

        <div class="form-group">
            <label for="url">URL *</label>
            <input type="url" id="url" name="url" required value="{{ endpoint.url }}">
        </div>

        <div class="form-group">
            <label for="endpoint_type">Endpoint Type</label>
            <select id="endpoint_type" name="endpoint_type">
                <option value="REST" {% if endpoint.endpoint_type == 'REST' %}selected{% endif %}>REST</option>
                <option value="WCF" {% if endpoint.endpoint_type == 'WCF' %}selected{% endif %}>WCF</option>
                <option value="SOAP" {% if endpoint.endpoint_type == 'SOAP' %}selected{% endif %}>SOAP</option>
                <option value="GraphQL" {% if endpoint.endpoint_type == 'GraphQL' %}selected{% endif %}>GraphQL</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="check_interval">Check Interval (seconds)</label>
                <input type="number" id="check_interval" name="check_interval" value="{{ endpoint.check_interval }}" min="10" max="3600">
            </div>

            <div class="form-group">
                <label for="timeout">Timeout (seconds)</label>
                <input type="number" id="timeout" name="timeout" value="{{ endpoint.timeout }}" min="5" max="300">
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="enabled" {% if endpoint.enabled %}checked{% endif %}>
                Enable monitoring for this endpoint
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
